<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>HD10 Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Outfit:wght@300;400;500;600&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/leaflet.css" />
<style>
@font-face{font-family:Tungsten;src:url("assets/fonts/TungstenBold.ttf") format("truetype");font-weight:700;font-display:swap}
@font-face{font-family:Tungsten;src:url("assets/fonts/TungstenBlack.ttf") format("truetype");font-weight:800 900;font-display:swap}
:root{
  /* NPS dashboard (war-room) tokens */
  --navy:#06111F; --navy-mid:#0C1D34; --navy-card:#0F2140; --navy-tile:#0F2438;
  --teal:#1A8B9A; --teal-lt:#22AABC; --gold:#D4A017; --gold-lt:#F0B82A;
  --fg:#EEF3FB; --fg-muted:#6B87A3; --fg-dim:#94A3B8;
  --border:rgba(255,255,255,0.07); --border-lt:rgba(255,255,255,0.15); --hairline:rgba(255,255,255,0.04);
  --dem:#2563EB; --dem-lt:#60A5FA; --rep:#DC2626; --rep-lt:#F87171; --npa:#7C3AED; --npa-lt:#A78BFA;
  --tint-teal:rgba(26,139,154,.10); --tint-gold:rgba(212,160,23,.10);
  --surface-tint-teal:rgba(26,139,154,0.07);
  --demo-purple:#A78BFA; --demo-green:#34D399; --demo-orange:#FB923C; --demo-amber:#F0B82A;
  --r-xs:2px; --r-sm:3px; --r-md:4px; --r-lg:8px; --r-xl:10px; --r-pill:999px;
  --d-base:160ms; --d-fast:130ms; --d-slow:400ms; --ease:cubic-bezier(.2,.7,.2,1); --ease-out:cubic-bezier(.2,.7,.2,1);
  --ff-display:'Tungsten','Oswald','Barlow Condensed',sans-serif;
  --ff-cond:'Barlow Condensed','Oswald',sans-serif;
  --ff-body:'Outfit','Inter',system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--ff-body);font-size:14px;color:var(--fg);background:var(--navy);-webkit-font-smoothing:antialiased;overflow:hidden}
button{font:inherit;color:inherit}
a{color:inherit}
.num{font-variant-numeric:tabular-nums}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
@keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

/* ══ Shell: rail + main ══ */
.shell{display:flex;height:100vh;width:100%}
.rail{width:212px;min-width:212px;background:var(--navy-mid);border-right:1px solid var(--border);position:relative;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.rail .stripe{position:absolute;inset:0;background:repeating-linear-gradient(108deg,transparent,transparent 28px,rgba(26,139,154,.045) 28px,rgba(26,139,154,.045) 30px);pointer-events:none}
.rail-top{position:relative;padding:18px 18px 16px;display:flex;align-items:center;gap:11px;border-bottom:1px solid var(--border)}
.rail-mark{width:32px;height:32px;border:2px solid var(--gold);border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-family:var(--ff-display);font-weight:900;font-size:15px;color:var(--gold-lt)}
.rail-brand .b1{font-family:var(--ff-display);font-weight:700;font-size:15px;letter-spacing:2px;text-transform:uppercase;color:var(--fg);line-height:1}
.rail-brand .b2{font-family:var(--ff-display);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--fg-muted);margin-top:3px;line-height:1}
.rail-nav{position:relative;flex:1;padding:12px 0;display:flex;flex-direction:column;gap:1px}
.rail-link{position:relative;display:flex;align-items:center;gap:10px;padding:11px 18px 11px 15px;text-decoration:none;border-left:3px solid transparent;background:none;text-align:left;cursor:pointer;color:var(--fg-muted);font-family:var(--ff-display);font-weight:600;font-size:13px;letter-spacing:2px;text-transform:uppercase;transition:color var(--d-base),background var(--d-base)}
.rail-link:hover{color:var(--fg);background:rgba(255,255,255,.03)}
.rail-link.active{border-left-color:var(--gold);background:var(--surface-tint-teal);color:var(--teal-lt)}
.rail-foot{position:relative;padding:14px 18px;border-top:1px solid var(--border)}
.rail-pill{display:inline-flex;align-items:center;gap:7px;background:rgba(212,160,23,.12);border:1px solid rgba(212,160,23,.28);border-radius:var(--r-xs);padding:5px 11px}
.rail-pill i{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:blink 2.2s ease infinite}
.rail-pill span{font-family:var(--ff-display);font-weight:600;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold-lt)}
.rail-meta{font-size:10px;color:var(--fg-muted);margin-top:11px;line-height:1.5}
.main-scroll{flex:1;min-width:0;overflow-y:auto;height:100vh;padding:26px 30px 46px}
.main-scroll::-webkit-scrollbar{width:8px}
.main-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:4px}

/* ══ Panels ══ */
.panel{display:none}.panel.on{display:block;animation:fade .2s var(--ease)}

/* ══ Page header (shared v2) ══ */
.phead{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;padding-bottom:18px;border-bottom:1px solid var(--border);margin-bottom:24px}
.phead .eyebrow{font-family:var(--ff-display);font-weight:600;font-size:11px;letter-spacing:2.4px;text-transform:uppercase;color:var(--teal-lt);margin-bottom:7px}
.phead h1{font-family:var(--ff-display);font-weight:900;font-size:36px;letter-spacing:1px;text-transform:uppercase;line-height:.94}
.phead .sub{font-size:12px;color:var(--fg-muted);margin-top:8px}
.phead .right{text-align:right;flex-shrink:0}
.live-row{display:flex;align-items:center;justify-content:flex-end;gap:6px;font-family:var(--ff-display);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--fg-muted)}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--gold);animation:blink 2.2s ease infinite}
.phead .stamp{font-size:11px;color:var(--fg-muted);margin-top:7px}

/* ══ Shared type/label helpers ══ */
.t-eyebrow{font-family:var(--ff-display);font-weight:600;font-size:11px;letter-spacing:2.4px;text-transform:uppercase;color:var(--fg-muted)}
.stat-lbl{font-family:var(--ff-display);font-weight:600;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--fg-muted);margin-bottom:4px}
.stat-val{font-family:var(--ff-display);font-weight:700;font-size:22px;line-height:1;color:var(--fg);font-variant-numeric:tabular-nums}
.stat-val.teal{color:var(--teal-lt)}.stat-val.gold{color:var(--gold-lt)}.stat-val.dem{color:var(--dem-lt)}.stat-val.rep{color:var(--rep-lt)}.stat-val.npa{color:var(--npa-lt)}

/* ══ Chart trays ══ */
.chart-tray{padding:16px;background:rgba(15,26,44,.5);border:1px solid var(--border);border-radius:var(--r-lg)}
.chart-tray-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.chart-tray-hd{font-family:var(--ff-display);font-weight:600;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--fg-muted)}
.chart-tray-meta{font-family:var(--ff-display);font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--fg-muted)}

/* ══ Demo bars ══ */
.demo-section{padding:6px 0}
.demo-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.demo-row:last-child{margin-bottom:0}
.demo-lbl{font-family:var(--ff-display);font-weight:600;font-size:12px;width:74px;flex-shrink:0;color:var(--fg-dim)}
.demo-track{flex:1;height:7px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden}
.demo-fill{height:100%;border-radius:4px;background:var(--teal);transition:width var(--d-slow) var(--ease-out)}
.demo-pct{font-family:var(--ff-display);font-weight:700;font-size:12px;width:38px;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums;color:var(--fg)}

/* ══ Party bar ══ */
.party-bar-track{display:flex;height:26px;border-radius:var(--r-md);overflow:hidden;background:#0F1A2C}
.party-bar-track > div{display:flex;align-items:center;justify-content:center;font-family:var(--ff-display);font-weight:700;font-size:11px;letter-spacing:.5px;color:#fff;white-space:nowrap}
.pb-d{background:var(--dem)}.pb-r{background:var(--rep)}.pb-n{background:var(--npa);opacity:.85}

/* ══ Margin pill ══ */
.margin-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:var(--r-pill);font-family:var(--ff-display);font-weight:700;font-size:11px;letter-spacing:1px}
.margin-pill.d{background:rgba(37,99,235,.12);border:1px solid rgba(37,99,235,.3);color:var(--dem-lt)}
.margin-pill.r{background:rgba(220,38,38,.12);border:1px solid rgba(220,38,38,.3);color:var(--rep-lt)}
.margin-pill.tie{background:rgba(148,163,184,.1);border:1px solid rgba(148,163,184,.25);color:var(--fg-dim)}

/* ══ Rank / cycle rows ══ */
.rank-row{transition:background var(--d-fast),border-color var(--d-fast);cursor:pointer}
.rank-row:hover{background:rgba(26,139,154,.06)}
.rank-row.sel{background:rgba(26,139,154,.09)}
.cyc-row{transition:background var(--d-fast)}
.cyc-row:hover{background:rgba(26,139,154,.06)}
.leaflet-interactive{cursor:pointer}
.detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:1180px){.detail-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:760px){.detail-grid{grid-template-columns:1fr}}
.mini-bars{display:flex;align-items:flex-end;gap:14px;height:96px;padding:8px 4px 0}
.mini-bars .col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
.mini-bars .col .n{font-family:var(--ff-display);font-weight:700;font-size:12px;font-variant-numeric:tabular-nums;margin-bottom:5px}
.mini-bars .col .bar{width:100%;max-width:38px;border-radius:3px 3px 0 0}
.mini-bars .col .yr{font-size:10px;color:var(--fg-muted);margin-top:7px;letter-spacing:1px}

/* ══ Section head (in-page) ══ */
.sec-head{display:flex;align-items:baseline;justify-content:space-between;gap:18px;margin:26px 0 12px}
.sec-head h2{font-family:var(--ff-display);font-weight:800;font-size:14px;letter-spacing:3px;text-transform:uppercase;color:var(--fg)}
.sec-head .note{font-family:var(--ff-display);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--fg-muted)}

/* ══ Page head (Signals — legacy, kept) ══ */
.page-head{margin-bottom:6px}
.page-head h2{font-family:var(--ff-display);font-weight:900;font-size:36px;letter-spacing:1px;line-height:.96;text-transform:uppercase}
.page-head p{color:var(--fg-dim);font-weight:300;font-size:14px;line-height:1.55;max-width:64ch;margin-top:12px}

/* ══ Map (shared) ══ */
.map-grid{display:grid;grid-template-columns:minmax(0,1fr) 380px;gap:16px}
.mapcard{position:relative;background:var(--navy);border:1px solid var(--border);border-radius:var(--r-xl);padding:8px}
.lmap{height:520px;max-height:64vh;min-height:420px;border-radius:var(--r-lg);background:var(--navy-tile)}
.map-controls{position:absolute;top:18px;left:18px;z-index:500;display:flex;flex-wrap:wrap;gap:6px;max-width:calc(100% - 36px)}
.seg-btn{border:1px solid var(--border-lt);background:rgba(6,17,31,.82);color:var(--fg-dim);cursor:pointer;border-radius:var(--r-md);padding:8px 11px;font-family:var(--ff-display);font-weight:600;font-size:12px;letter-spacing:1.1px;text-transform:uppercase;backdrop-filter:blur(8px);transition:var(--d-base)}
.seg-btn:hover{color:var(--fg)}
.seg-btn.on{color:#06111F;background:var(--gold-lt);border-color:var(--gold-lt)}
.maplegend{position:absolute;bottom:18px;left:18px;z-index:500;background:rgba(6,17,31,.9);border:1px solid var(--border-lt);border-radius:var(--r-lg);padding:11px 13px;backdrop-filter:blur(8px)}
.maplegend .row{display:flex;align-items:center;gap:8px;font-size:11.5px;margin-top:5px;color:var(--fg)}.maplegend i{width:16px;height:10px;border-radius:var(--r-xs)}
.leaflet-container{font-family:var(--ff-body)!important;background:var(--navy-tile)!important}
.leaflet-tooltip{background:rgba(6,17,31,.94)!important;border:1px solid var(--border-lt)!important;color:#fff!important;border-radius:7px!important;box-shadow:0 8px 22px rgba(0,0,0,.45)!important}
.leaflet-tooltip:before{display:none}
.plabel{font-family:var(--ff-display);font-weight:700;letter-spacing:.9px;text-transform:uppercase;color:#fff;text-shadow:0 1px 5px rgba(0,0,0,.9);font-size:13px;text-align:center}
.plabel-wrap{background:none!important;border:0!important;box-shadow:none!important}
.leaflet-control-zoom a{background:rgba(6,17,31,.85)!important;color:var(--fg)!important;border-color:var(--border-lt)!important}

/* ══ Side panels + data rows (Signals — kept) ══ */
.side{display:flex;flex-direction:column;gap:14px}
.panel-card{background:var(--navy-mid);border:1px solid var(--border);border-radius:var(--r-xl);padding:22px}
.panel-card.card-accent{border-top:3px solid var(--accent,var(--teal))}
.pc-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:4px}
.pc-top h3{font-family:var(--ff-display);font-weight:800;font-size:26px;line-height:1;text-transform:uppercase;letter-spacing:.4px}
.tag{display:inline-flex;align-items:center;border:1px solid currentColor;color:var(--accent,var(--gold));border-radius:var(--r-xs);padding:5px 9px;font-family:var(--ff-display);font-weight:600;font-size:11px;letter-spacing:1.2px;text-transform:uppercase}
.rows{display:flex;flex-direction:column;margin-top:14px}
.drow{display:flex;justify-content:space-between;gap:16px;padding:11px 0;border-bottom:1px solid var(--border);font-size:13px}
.drow:last-child{border-bottom:0}
.drow .l{color:var(--fg-muted)}
.drow .v{font-family:var(--ff-display);font-weight:700;font-size:17px;color:var(--fg);font-variant-numeric:tabular-nums;text-align:right}
.bar{margin-top:14px}
.bar-top{display:flex;justify-content:space-between;margin-bottom:5px;font-size:12px;color:var(--fg-dim)}
.bar-top b{font-family:var(--ff-display);font-size:14px;color:var(--fg)}
.track{height:9px;background:rgba(255,255,255,.06);border-radius:var(--r-sm);overflow:hidden}
.track i{display:block;height:100%;border-radius:var(--r-sm);background:var(--accent,var(--teal))}
.kk{font-family:var(--ff-display);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--fg-muted)}

/* ══ Tables (Signals — kept) ══ */
.table-wrap{background:var(--navy-mid);border:1px solid var(--border);border-radius:var(--r-xl);overflow:hidden}
table.tbl{width:100%;border-collapse:collapse}
table.tbl th,table.tbl td{padding:13px 16px;border-bottom:1px solid var(--border);text-align:left;vertical-align:middle}
table.tbl tr:last-child td{border-bottom:0}
table.tbl th{font-family:var(--ff-display);font-weight:600;font-size:11px;letter-spacing:1.6px;text-transform:uppercase;color:var(--fg-muted);background:rgba(255,255,255,.02)}
table.tbl td{font-size:13px;color:var(--fg-dim)}
table.tbl td b{color:var(--fg);font-family:var(--ff-display);font-weight:700;font-size:15px;font-variant-numeric:tabular-nums}

.callout{background:var(--tint-gold);border:1px solid rgba(212,160,23,.28);border-radius:var(--r-lg);padding:16px 18px;color:var(--fg-dim);font-size:13px;line-height:1.55}
.callout b{color:var(--gold)}
.btn{border:1px solid var(--border-lt);background:var(--navy-card);color:var(--fg);border-radius:var(--r-md);padding:10px 14px;cursor:pointer;font-family:var(--ff-display);font-weight:600;font-size:12px;letter-spacing:1.1px;text-transform:uppercase;transition:var(--d-base)}
.btn:hover{border-color:var(--teal-lt);color:var(--teal-lt)}
.btn.gold{background:var(--gold);border-color:var(--gold);color:#06111F}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.linklike{font-family:var(--ff-body);font-size:11px;color:var(--teal-lt);text-decoration:none;letter-spacing:.5px;cursor:pointer;background:none;border:0}
.linklike:hover{color:var(--teal)}

@media(max-width:1080px){
  .map-grid{grid-template-columns:1fr}
}
@media(max-width:760px){
  .shell{flex-direction:column;height:auto;overflow:visible}
  body{overflow:auto}
  .rail{width:100%;height:auto;flex-direction:row;flex-wrap:wrap;align-items:center}
  .rail-nav{flex-direction:row;flex-wrap:wrap;flex:1 1 100%;padding:8px}
  .rail-link{border-left:0;border-bottom:3px solid transparent;padding:8px 12px}
  .rail-link.active{border-left:0;border-bottom-color:var(--gold)}
  .rail-foot{display:none}
  .main-scroll{height:auto;overflow:visible;padding:20px 16px 40px}
  .phead{flex-direction:column;align-items:flex-start;gap:10px}
  .phead .right{text-align:left}.live-row{justify-content:flex-start}
}
</style>
</head>
<body>
<div class="shell">
  <!-- ══ LEFT COMMAND RAIL ══ -->
  <nav class="rail" aria-label="Main sections">
    <div class="stripe"></div>
    <div class="rail-top">
      <div class="rail-mark">10</div>
      <div class="rail-brand">
        <div class="b1">HD10</div>
        <div class="b2">Command</div>
      </div>
    </div>
    <div class="rail-nav">
      <button class="rail-link active" type="button" data-tab="overview">Overview</button>
      <button class="rail-link" type="button" data-tab="precincts">Precincts</button>
      <button class="rail-link" type="button" data-tab="voters">Voters</button>
      <button class="rail-link" type="button" data-tab="signals">Signals</button>
      <button class="rail-link" type="button" data-tab="history">History</button>
    </div>
    <div class="rail-foot">
      <div class="rail-pill"><i></i><span>2026 Cycle</span></div>
      <div class="rail-meta" id="rail-meta">Connecticut House District 10 · SOTS Voter File</div>
    </div>
  </nav>

  <!-- ══ MAIN ══ -->
  <main class="main-scroll">
    <section class="panel on" id="tab-overview"></section>
    <section class="panel" id="tab-precincts"></section>
    <section class="panel" id="tab-voters"></section>
    <section class="panel" id="tab-signals"></section>
    <section class="panel" id="tab-history"></section>
  </main>
</div>

<script src="assets/leaflet.js"></script>
<script src="data/hd10.js?v=26"></script>
<script src="data/target.js?v=26"></script>
<script src="app.js?v=26"></script>
</body>
</html>
